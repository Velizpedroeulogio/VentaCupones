<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Visor Modelo{% endblock %} — MDL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-size: 13px; }
        th a { text-decoration: none; color: inherit; white-space: nowrap; }

        th { white-space: nowrap; }
        td { white-space: nowrap; }
    </style>
</head>
<body>

    <span class="navbar-brand fw-bold me-4">Visor DB</span>
    <div class="navbar-nav flex-row gap-3">
        <a class="nav-link text-white" href="/mdl/">Tablas</a>
        <a class="nav-link text-white" href="/mdl/columnas/">Columnas</a>
        <a class="nav-link text-white" href="/mdl/indices/">Índices</a>
    </div>
</nav>
<div class="container-fluid px-3">
    {% block content %}{% endblock %}
</div>
</body>
</html>
