<!-- DNI (solo lectura) -->
<div class="byl-field mb-2">
    <label>DNI</label>
    <span id="lbl-dni" style="font-weight:bold;font-size:14px;"></span>
</div>

<!-- Nombre -->
<div class="byl-field mb-2">
    <label for="f-per_nombre">Nombre</label>
    <input type="text" id="f-per_nombre" placeholder="Nombre completo">
</div>

<!-- Dirección -->
<div class="d-flex gap-2 mb-2 flex-wrap">
    <div class="byl-field" style="flex:2 1 120px;">
        <label for="f-per_calle">Calle</label>
        <input type="text" id="f-per_calle" placeholder="Calle">
    </div>
    <div class="byl-field" style="flex:1 1 60px;">
        <label for="f-per_puerta">Puerta</label>
        <input type="text" id="f-per_puerta" placeholder="Nro">
    </div>
    <div class="byl-field" style="flex:1 1 50px;">
        <label for="f-per_piso">Piso</label>
        <input type="text" id="f-per_piso" placeholder="Piso">
    </div>
    <div class="byl-field" style="flex:1 1 50px;">
        <label for="f-per_depto">Depto</label>
        <input type="text" id="f-per_depto" placeholder="Dpto">
    </div>
</div>

<!-- Barrio / CP -->
<div class="d-flex gap-2 mb-2 flex-wrap">
    <div class="byl-field" style="flex:2 1 120px;">
        <label for="f-per_barrio">Barrio</label>
        <input type="text" id="f-per_barrio" placeholder="Barrio">
    </div>
    <div class="byl-field" style="flex:1 1 80px;">
        <label for="f-per_codigo_postal">Cód. Postal</label>
        <input type="text" id="f-per_codigo_postal" placeholder="CP">
    </div>
</div>

<!-- Provincia (lookup) -->
<div class="byl-field mb-2" style="position:relative;">
    <label for="f-per_provincia_txt">Provincia</label>
    <input type="text" id="f-per_provincia_txt" placeholder="Buscar provincia..." autocomplete="off">
    <input type="hidden" id="f-per_provincia_id">
    <div id="drop-provincia" class="byl-dropdown" style="display:none;"></div>
</div>

<!-- Departamento (lookup) -->
<div class="byl-field mb-2" style="position:relative;">
    <label for="f-per_departamento_txt">Departamento</label>
    <input type="text" id="f-per_departamento_txt" placeholder="Buscar departamento..." autocomplete="off">
    <input type="hidden" id="f-per_departamento_id">
    <div id="drop-departamento" class="byl-dropdown" style="display:none;"></div>
</div>

<!-- Localidad (lookup) -->
<div class="byl-field mb-2" style="position:relative;">
    <label for="f-per_localidad_txt">Localidad</label>
    <input type="text" id="f-per_localidad_txt" placeholder="Buscar localidad..." autocomplete="off">
    <input type="hidden" id="f-per_localidad_id">
    <div id="drop-localidad" class="byl-dropdown" style="display:none;"></div>
</div>

<!-- Contacto -->
<div class="d-flex gap-2 mb-2 flex-wrap">
    <div class="byl-field" style="flex:1 1 120px;">
        <label for="f-per_celular">Celular</label>
        <input type="text" id="f-per_celular" placeholder="Celular">
    </div>
    <div class="byl-field" style="flex:1 1 120px;">
        <label for="f-per_telefono">Teléfono</label>
        <input type="text" id="f-per_telefono" placeholder="Teléfono">
    </div>
</div>

<!-- Email -->
<div class="byl-field mb-2">
    <label for="f-per_email">eMail</label>
    <input type="email" id="f-per_email" placeholder="correo@ejemplo.com">
</div>

<!-- CBU -->
<div class="d-flex gap-2 mb-2 flex-wrap">
    <div class="byl-field" style="flex:1 1 120px;">
        <label for="f-per_alias_cbu">Alias CBU</label>
        <input type="text" id="f-per_alias_cbu" placeholder="Alias">
    </div>
    <div class="byl-field" style="flex:2 1 160px;">
        <label for="f-per_cbu">CBU</label>
        <input type="text" id="f-per_cbu" placeholder="CBU">
    </div>
</div>

<!-- Fecha de nacimiento -->
<div class="byl-field mb-2">
    <label for="f-per_fecha_nac">Fecha Nacimiento</label>
    <input type="date" id="f-per_fecha_nac">
</div>

<!-- Tipo Identidad / Tipo Persona -->
<div class="d-flex gap-2 mb-2 flex-wrap">
    <div class="byl-field" style="flex:1 1 140px;">
        <label for="f-per_tipo_identidad_id">Tipo Identidad</label>
        <select id="f-per_tipo_identidad_id">
            <option value="">-- Seleccione --</option>
            {% for t in tipos_identidad %}
            <option value="{{ t.id }}">{{ t.nombre }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="byl-field" style="flex:1 1 140px;">
        <label for="f-per_tipo_persona_id">Tipo Persona</label>
        <select id="f-per_tipo_persona_id">
            <option value="">-- Seleccione --</option>
            {% for t in tipos_persona %}
            <option value="{{ t.id }}">{{ t.nombre }}</option>
            {% endfor %}
        </select>
    </div>
</div>
