{% extends "base.html" %}
{% block title %}Selección de Cupón{% endblock %}

{% block content %}
<div class="byl-pad">

    {% if img_evento %}
    <div class="mt-2 mb-2">
        <img class="byl-img-evento" src="{{ img_evento }}" alt="Evento">
    </div>
    {% endif %}

    <div class="byl-title mt-2 mb-3">Selección de Cupón</div>

    <div class="byl-card" id="sec-seleccion">

        <!-- Picklist + Próximo Disponible -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <select id="sel-cantidad" style="border:1px solid var(--byl-border);border-radius:4px;padding:5px 10px;font-size:14px;">
                <option value="">-- Cartones --</option>
                {% for c in cantidades %}
                <option value="{{ c }}">{{ c }}</option>
                {% endfor %}
            </select>
            <button class="byl-btn" type="button" id="btn-proximo">Próximo Disponible</button>
        </div>

        <!-- Números Preferidos -->
        <div class="d-flex align-items-center gap-2 mb-2">
            <strong>Números Preferidos</strong>
            <span style="font-size:13px;color:#555;">(ingresar hasta cinco)</span>
        </div>

        <div class="d-flex gap-2 align-items-center flex-wrap mb-2">
            <input type="number" class="num-pref" min="1" max="90" style="width:54px;text-align:center;border:1px solid var(--byl-border);border-radius:4px;padding:5px;font-size:14px;" placeholder="--">
            <input type="number" class="num-pref" min="1" max="90" style="width:54px;text-align:center;border:1px solid var(--byl-border);border-radius:4px;padding:5px;font-size:14px;" placeholder="--">
            <input type="number" class="num-pref" min="1" max="90" style="width:54px;text-align:center;border:1px solid var(--byl-border);border-radius:4px;padding:5px;font-size:14px;" placeholder="--">
            <input type="number" class="num-pref" min="1" max="90" style="width:54px;text-align:center;border:1px solid var(--byl-border);border-radius:4px;padding:5px;font-size:14px;" placeholder="--">
            <input type="number" class="num-pref" min="1" max="90" style="width:54px;text-align:center;border:1px solid var(--byl-border);border-radius:4px;padding:5px;font-size:14px;" placeholder="--">
            <button class="byl-btn" type="button" id="btn-buscar">Buscar</button>
        </div>

        <div id="msg-error" class="byl-error mt-2" style="display:none;"></div>
    </div>

    <!-- Resultado -->
    <div id="sec-resultado" style="display:none;">
        <div class="byl-card">
            <div class="d-flex gap-2 mb-3 flex-wrap">
                <form method="post" action="{% url 'ventas:confirmar_cupon' evn %}" style="display:inline;">
                    {% csrf_token %}
                    <input type="hidden" id="inp-sec" name="sec" value="">
                    <button class="byl-btn" type="submit">Confirmo</button>
                </form>
                <button class="byl-btn" type="button" id="btn-anterior">Anterior</button>
                <button class="byl-btn" type="button" id="btn-proximo-pag">Próximo</button>
            </div>
            <div class="byl-section-title mb-2">Cartones</div>
            <div id="cartones-container"></div>
        </div>
    </div>

    <div class="mt-3">
        <a class="byl-btn" href="{% url 'ventas:principal' evn %}">Volver</a>
    </div>

</div>

<script>
const URL_PROXIMO  = "{% url 'ventas:proximo_api' evn %}";
const URL_CARTONES = "{% url 'ventas:cartones_api' evn %}";
const CSRF = "{{ csrf_token }}";

let secuencias = [];
let currentIdx = 0;

function mostrarError(msg) {
    const el = document.getElementById('msg-error');
    el.textContent = msg;
    el.style.display = msg ? '' : 'none';
}

function actualizarPaginacion() {
    document.getElementById('btn-anterior').disabled    = currentIdx === 0;
    document.getElementById('btn-proximo-pag').disabled = currentIdx >= secuencias.length - 1;
}

function renderCartones(sec, cartones) {
    document.getElementById('inp-sec').value = sec;
    const cont = document.getElementById('cartones-container');
    if (!cartones.length) {
        cont.innerHTML = '<div class="byl-error">Sin cartones para este cupón.</div>';
    } else {
        cont.innerHTML = cartones.map((c, i) =>
            `<div style="font-size:13px;margin-bottom:4px;"><strong>${i + 1}:</strong> ${(c.lis || []).join(' ')}</div>`
        ).join('');
    }
    document.getElementById('sec-resultado').style.display = '';
    document.getElementById('sec-resultado').scrollIntoView({behavior: 'smooth'});
    actualizarPaginacion();
}

async function fetchSecuencias(numsPref) {
    mostrarError('');
    const cantidad = document.getElementById('sel-cantidad').value;
    if (!cantidad) { mostrarError('Seleccioná una cantidad de cartones'); return; }
    try {
        const body = {cantidad: parseInt(cantidad)};
        if (numsPref && numsPref.length) body.nums_pref = numsPref;
        const r = await fetch(URL_PROXIMO, {
            method: 'POST',
            headers: {'X-CSRFToken': CSRF, 'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });
        const d = await r.json();
        if (!d.ok) { mostrarError(d.error); return; }
        secuencias = d.secuencias;
        currentIdx = 0;
        renderCartones(d.sec, d.cartones);
    } catch(e) {
        mostrarError('Error de conexión');
    }
}

async function fetchCartones(sec) {
    mostrarError('');
    try {
        const r = await fetch(URL_CARTONES, {
            method: 'POST',
            headers: {'X-CSRFToken': CSRF, 'Content-Type': 'application/json'},
            body: JSON.stringify({sec})
        });
        const d = await r.json();
        if (!d.ok) { mostrarError(d.error); return; }
        renderCartones(d.sec, d.cartones);
    } catch(e) {
        mostrarError('Error de conexión');
    }
}

document.getElementById('btn-proximo').addEventListener('click', () => fetchSecuencias(null));

document.getElementById('btn-buscar').addEventListener('click', function() {
    mostrarError('');
    const vals = [...document.querySelectorAll('.num-pref')]
        .map(i => i.value.trim()).filter(v => v !== '');
    if (vals.length < 2) { mostrarError('Ingrese al menos 2 números'); return; }
    const nums = vals.map(Number);
    if (nums.some(n => n < 1 || n > 90)) { mostrarError('Los números deben estar entre 1 y 90'); return; }
    if (new Set(nums).size !== nums.length) { mostrarError('Los números no deben repetirse'); return; }
    fetchSecuencias(nums);
});

document.getElementById('btn-proximo-pag').addEventListener('click', function() {
    if (currentIdx < secuencias.length - 1) {
        currentIdx++;
        fetchCartones(secuencias[currentIdx]);
    }
});

document.getElementById('btn-anterior').addEventListener('click', function() {
    if (currentIdx > 0) {
        currentIdx--;
        fetchCartones(secuencias[currentIdx]);
    }
});
</script>
{% endblock %}
