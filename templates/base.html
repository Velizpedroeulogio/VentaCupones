{% load static %}<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>{% block title %}Venta de Cupones{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --byl-bg: #F3E9E6;
            --byl-card: #F8F2F2;
            --byl-border: #D7B5B5;
            --byl-accent: #6A1B1B;
            --byl-btn-bg: #E8CFCF;
            --byl-btn-fg: #5A2A2A;
            --byl-danger: #C62828;
        }
        body {
            background: var(--byl-bg);
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            font-size: 14px;
        }
        .byl-shell { max-width: 480px; margin: 0 auto; padding: 0; }
        .byl-pad { padding: 6px 15px; }
        .byl-title {
            color: var(--byl-accent);
            font-weight: bold;
            font-size: 22px;
        }
        .byl-section-title {
            color: var(--byl-accent);
            font-weight: bold;
            font-size: 16px;
        }
        .byl-btn {
            background: var(--byl-btn-bg);
            color: var(--byl-btn-fg);
            border: none;
            border-radius: 4px;
            padding: 6px 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .byl-btn:hover { background: #d8bcbc; color: var(--byl-btn-fg); }
        .byl-btn-fecha {
            background: var(--byl-danger);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 4px 10px;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .byl-btn-fecha:hover { background: #a41f1f; color: white; }
        .byl-error {
            background: #fff3f3;
            border: 1px solid var(--byl-danger);
            color: #6a1b1b;
            padding: 12px;
            border-radius: 8px;
            margin: 8px 0;
        }
        .byl-img-evento { width: 100%; max-width: 460px; display: block; margin: 0 auto; }
        .byl-field label { font-weight: bold; font-size: 13px; }
        .byl-field input {
            width: 100%;
            border: 1px solid var(--byl-border);
            border-radius: 4px;
            padding: 6px 8px;
            font-size: 14px;
            background: white;
        }
    </style>
</head>
<body>
    <div class="byl-shell">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
